<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WooCommerce QR Generator (DMF-LIM)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            width: 100%;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #2980b9;
        }
        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #c0392b;
        }
        .result {
            margin-top: 30px;
            text-align: center;
            border-top: 2px dashed #ecf0f1;
            padding-top: 20px;
        }
        .result h3 {
            color: #2ecc71;
            margin-bottom: 10px;
        }
        .result-link {
            word-break: break-all;
            color: #2980b9;
            text-decoration: none;
        }
        .result-link:hover {
            text-decoration: underline;
        }
        .qr-wrapper {
            background-color: #fff;
            padding: 20px;
            display: inline-block;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #ecf0f1;
        }
        .qr-image {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .download-btn {
            display: block;
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            transition: background-color 0.3s ease;
        }
        .download-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code Generator</h1>
        <p class="subtitle">Shop: <strong>{{ wc_url | default('WooCommerce') }}</strong></p>
        
        {% if error %}
        <div class="error">
            <strong>Error:</strong> {{ error }}
        </div>
        {% endif %}

        <form action="/generate" method="POST">
            <div class="form-group">
                <label for="sku">Product SKU:</label>
                <input type="text" id="sku" name="sku" value="{{ sku | default('') }}" placeholder="Example: ART-12345" required>
            </div>
            <button type="submit">Generate QR Code</button>
        </form>

        {% if qr_base64 %}
        <div class="result">
            <h3>Successfully Generated!</h3>
            <p><strong>Product URL:</strong> <br><a class="result-link" href="{{ permalink }}" target="_blank">{{ permalink }}</a></p>
            
            <div class="qr-wrapper">
                <img class="qr-image" src="data:image/png;base64,{{ qr_base64 }}" alt="QR Code for {{ sku }}">
            </div>
            
            <a class="download-btn" href="data:image/png;base64,{{ qr_base64 }}" download="QR_{{ sku }}.png">
                📥 Download Image (PNG)
            </a>
        </div>
        {% endif %}
    </div>
</body>
</html>
